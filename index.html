  // --- IndexedDB Wrapper para Batching con TTL (3 días) ---
  const TrialDB = {
    dbName: 'jsPsychTrialsDB',
    storeName: 'trials',
    db: null,
    TTL_DAYS: 3,

    async init() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(this.dbName, 1);
        
        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
          this.db = request.result;
          // Limpiar datos vencidos al iniciar
          this.cleanExpiredData().catch(err => console.error('Error cleaning expired data:', err));
          resolve(this.db);
        };
        
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(this.storeName)) {
            const store = db.createObjectStore(this.storeName, { 
              keyPath: 'id', 
              autoIncrement: true 
            });
            store.createIndex('sessionId', 'sessionId', { unique: false });
            store.createIndex('timestamp', 'timestamp', { unique: false });
            store.createIndex('createdAt', 'createdAt', { unique: false });
          }
        };
      });
    },

    async cleanExpiredData() {
      if (!this.db) await this.init();
      const now = Date.now();
      const expirationTime = this.TTL_DAYS * 24 * 60 * 60 * 1000; // 3 días en ms
      
      return new Promise((resolve, reject) => {
        const transaction = this.db.transaction([this.storeName], 'readwrite');
        const store = transaction.objectStore(this.storeName);
        const index = store.index('createdAt');
        const request = index.openCursor();
        
        let deletedCount = 0;
        
        request.onsuccess = (event) => {
          const cursor = event.target.result;
          if (cursor) {
            const trial = cursor.value;
            const age = now - (trial.createdAt || now);
            
            if (age > expirationTime) {
              cursor.delete();
              deletedCount++;
            }
            cursor.continue();
          } else {
            if (deletedCount > 0) {
              console.log(`Cleaned ${deletedCount} expired trials from IndexedDB`);
            }
            resolve(deletedCount);
          }
        };
        
        request.onerror = () => reject(request.error);
      });
    },

    async add(trial) {
      if (!this.db) await this.init();
      return new Promise((resolve, reject) => {
        const transaction = this.db.transaction([this.storeName], 'readwrite');
        const store = transaction.objectStore(this.storeName);
        const request = store.add({
          ...trial,
          timestamp: Date.now(),
          createdAt: Date.now(),
          sessionId: trialSessionId
        });
        
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    },

    async getAll() {
      if (!this.db) await this.init();
      return new Promise((resolve, reject) => {
        const transaction = this.db.transaction([this.storeName], 'readonly');
        const store = transaction.objectStore(this.storeName);
        const request = store.getAll();
        
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    },

    async count() {
      if (!this.db) await this.init();
      return new Promise((resolve, reject) => {
        const transaction = this.db.transaction([this.storeName], 'readonly');
        const store = transaction.objectStore(this.storeName);
        const request = store.count();
        
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    },

    async getN(n) {
      if (!this.db) await this.init();
      return new Promise((resolve, reject) => {
        const transaction = this.db.transaction([this.storeName], 'readonly');
        const store = transaction.objectStore(this.storeName);
        const request = store.getAll(null, n);
        
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    },

    async deleteN(n) {
      if (!this.db) await this.init();
      const trials = await this.getN(n);
      return new Promise((resolve, reject) => {
        const transaction = this.db.transaction([this.storeName], 'readwrite');
        const store = transaction.objectStore(this.storeName);
        
        trials.forEach(trial => {
          store.delete(trial.id);
        });
        
        transaction.oncomplete = () => resolve(trials.length);
        transaction.onerror = () => reject(transaction.error);
      });
    },

    async clear() {
      if (!this.db) await this.init();
      return new Promise((resolve, reject) => {
        const transaction = this.db.transaction([this.storeName], 'readwrite');
        const store = transaction.objectStore(this.storeName);
        const request = store.clear();
        
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }
  };

  // Resuelve a qué trial saltar al reanudar evaluando las branch conditions guardadas.
  // Retorna el id (string) del trial destino, o null si no hay punto de retoma.
  function _resolveResumeBranch(resumeRaw) {
    if (!resumeRaw) return null;
    try {
      const d = JSON.parse(resumeRaw);
      const branches = d.branches || [];
      const branchConditions = d.branchConditions || [];
      const trialData = d.trialData || {};

      if (branches.length === 0) return null; // trial terminal, experimento terminó
      if (branches.length === 1) return String(branches[0]); // único branch, sin condiciones

      // Múltiples branches: evaluar condiciones (OR entre condiciones, AND entre reglas)
      const flat = Array.isArray(branchConditions[0])
        ? branchConditions.flat()
        : branchConditions;

      for (let i = 0; i < flat.length; i++) {
        const cond = flat[i];
        if (!cond || !cond.rules) continue;
        const match = cond.rules.every(rule => {
          let col = rule.column || '';
          if (!col && rule.componentIdx && rule.prop) col = rule.componentIdx + '_' + rule.prop;
          else if (!col && rule.prop) col = rule.prop;
          let val = trialData[col];
          // Manejar respuestas anidadas (SurveyComponent)
          if (val === undefined) {
            const parts = col.split('_');
            if (parts.length >= 2) {
              const resp = trialData[parts.slice(0, -1).join('_') + '_response'];
              if (resp && typeof resp === 'object') val = resp[parts[parts.length - 1]];
            }
          }
          // Respuestas en array (multi-select)
          if (Array.isArray(val)) {
            const has = val.includes(rule.value) || val.includes(String(rule.value));
            return rule.op === '==' ? has : rule.op === '!=' ? !has : false;
          }
          const n1 = parseFloat(val), n2 = parseFloat(rule.value);
          const isNum = !isNaN(n1) && !isNaN(n2);
          switch (rule.op) {
            case '==': return isNum ? n1 === n2 : val == rule.value;
            case '!=': return isNum ? n1 !== n2 : val != rule.value;
            case '>':  return isNum && n1 > n2;
            case '<':  return isNum && n1 < n2;
            case '>=': return isNum && n1 >= n2;
            case '<=': return isNum && n1 <= n2;
            default:   return false;
          }
        });
        if (match && i < branches.length) return String(branches[i]);
      }
      return String(branches[0]); // fallback al primero si ninguna condición matchea
    } catch (e) {
      return null; // datos corruptos
    }
  }

    const sessionRef = db.ref('sessions/eb44ae71-554b-4547-9365-5da1da087cf8/' + trialSessionId);
    await sessionRef.set({

    });
    
    sessionRef.onDisconnect().update({
      connected: false,
      state: 'disconnected',
      disconnectedAt: window.firebase.database.ServerValue.TIMESTAMP,
      storage: 'googledrive'
    });

    // --- Branching logic functions (outside initJsPsych for timeline access) ---
    window.nextTrialId = null;
    window.skipRemaining = false;
    window.branchingActive = false;
    window.branchCustomParameters = null; // Store custom parameters for the next trial

    const evaluateCondition = (trialData, condition) => {
      // All rules in a condition must be true (AND logic)
      return condition.rules.every(rule => {
        // Construct column name from componentIdx and prop if column is empty
        // This handles dynamic plugins like ButtonResponseComponent_1_response
        let columnName = rule.column || "";
        if (!columnName && rule.componentIdx && rule.prop) {
          columnName = rule.componentIdx + '_' + rule.prop;
        } else if (!columnName && rule.prop) {
          columnName = rule.prop;
        }
        
        if (!columnName) {
          console.warn('No column name specified in rule:', rule);
          return false;
        }
        
        // Get value directly from the column
        const propValue = trialData[columnName];
        
        if (propValue === undefined) {
          console.warn('Column not found in trial data:', columnName);
          return false;
        }
        
        const compareValue = rule.value;
        
        // Handle array responses (multi-select or single-select returned as array)
        if (Array.isArray(propValue)) {
          const matches = propValue.includes(compareValue) || propValue.includes(String(compareValue));
          switch (rule.op) {
            case '==':
              return matches;
            case '!=':
              return !matches;
            default:
              return false;
          }
        }

        switch (rule.op) {
          case '==':
            return isNumeric ? numPropValue === numCompareValue : propValue == compareValue;
          case '!=':
            return isNumeric ? numPropValue !== numCompareValue : propValue != compareValue;
          case '>':
            return isNumeric && numPropValue > numCompareValue;
          case '<':
            return isNumeric && numPropValue < numCompareValue;
          case '>=':
            return isNumeric && numPropValue >= numCompareValue;
          case '<=':
            return isNumeric && numPropValue <= numCompareValue;
          default:
            return false;

        trial_index: `batch_${batchNumber}` // ID único para batch

        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "*/*" },
        body: JSON.stringify({

          sessionId: trialSessionId,
          data: concatenatedData,
          storage: "googledrive",
        }),
      })
      .then(res => {
        if (!res.ok) {
          return res.text().then(text => {

        }
        return res.json();
      })
      .then(result => {
        if (result && result.success) {
          console.log(`Batch #${batchNumber} sent successfully`);
        }
      })
      .catch(error => {
        console.error('Error in sendBatchConcatenated:', error);
      })
      .finally(() => {
        const index = pendingBatchSaves.indexOf(batchPromise);
        if (index > -1) {
          pendingBatchSaves.splice(index, 1);

      pendingBatchSaves.push(batchPromise);
